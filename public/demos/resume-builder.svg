  <!-- Right: live resume preview -->
  <g transform="translate(540,188)" filter="url(#shadow)">
    <rect width="576" height="480" rx="14" fill="#ffffff"/>
    <rect x="0" y="0" width="576" height="8" rx="14" fill="url(#brand)"/>
    <text x="32" y="64" fill="#0f172a" font-size="30" font-weight="800">Prottus Manna</text>
    <text x="32" y="90" fill="#6366f1" font-size="14" font-weight="600">Full-Stack Developer &amp; AI Engineer</text>
    <text x="32" y="112" fill="#64748b" font-size="11">prottus2004@gmail.com · +91 8697736679 · Kolkata</text>
    <line x1="32" y1="128" x2="544" y2="128" stroke="#e2e8f0"/>

    <text x="32" y="158" fill="#0f172a" font-size="13" font-weight="700">EXPERIENCE</text>
    <text x="32" y="180" fill="#334155" font-size="12" font-weight="600">Machine Learning Intern — Zidio Developments</text>
    <text x="470" y="180" fill="#94a3b8" font-size="10">May–Aug 2025</text>
    <rect x="32" y="188" width="512" height="3" fill="#f1f5f9"/>
    <rect x="32" y="198" width="470" height="3" fill="#f1f5f9"/>
    <rect x="32" y="208" width="500" height="3" fill="#f1f5f9"/>
    <rect x="32" y="218" width="380" height="3" fill="#f1f5f9"/>

    <text x="32" y="252" fill="#0f172a" font-size="13" font-weight="700">PROJECTS</text>
    <text x="32" y="274" fill="#334155" font-size="12" font-weight="600">Optimus AI · Vision AI Suite · Fraud Guard AI</text>
    <rect x="32" y="282" width="512" height="3" fill="#f1f5f9"/>
    <rect x="32" y="292" width="460" height="3" fill="#f1f5f9"/>

    <text x="32" y="326" fill="#0f172a" font-size="13" font-weight="700">SKILLS</text>
    <g font-size="10" fill="#334155">
      <text x="32" y="348">Python · Java · C/C++ · React · Node · PyTorch · RAG · SQL · Azure</text>
    </g>

    <text x="32" y="384" fill="#0f172a" font-size="13" font-weight="700">EDUCATION</text>
    <text x="32" y="406" fill="#334155" font-size="12" font-weight="600">B.Tech in Information Technology — IEM, Kolkata</text>
    <text x="470" y="406" fill="#94a3b8" font-size="10">2022–2026</text>
    <rect x="32" y="414" width="512" height="3" fill="#f1f5f9"/>
    <rect x="32" y="424" width="380" height="3" fill="#f1f5f9"/>

    <text x="32" y="456" fill="#6366f1" font-size="10" font-weight="700">ATS-FRIENDLY · TEXT-SELECTABLE PDF</text>
  </g>

  <!-- floating accent dot -->
  <circle cx="1130" cy="700" r="6" fill="#0ea5e9"/>
  <text x="1100" y="724" text-anchor="end" fill="#475569" font-size="10">Resume Builder · demo</text>
</svg>