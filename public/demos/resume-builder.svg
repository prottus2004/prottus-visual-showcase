<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#0e1730"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="750" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="240" fill="#6366f1" opacity="0.10"/>
  <circle cx="180" cy="640" r="200" fill="#0ea5e9" opacity="0.10"/>

  <!-- App window -->
  <g filter="url(#shadow)">
    <rect x="60" y="60" width="1080" height="630" rx="20" fill="#0c1426" stroke="#1e293b"/>
  </g>

  <!-- titlebar -->
  <rect x="60" y="60" width="1080" height="52" rx="20" fill="#0a1120"/>
  <rect x="60" y="98" width="1080" height="14" fill="#0a1120"/>
  <circle cx="92" cy="86" r="7" fill="#ef4444"/>
  <circle cx="116" cy="86" r="7" fill="#f59e0b"/>
  <circle cx="140" cy="86" r="7" fill="#22c55e"/>
  <rect x="430" y="74" width="340" height="24" rx="12" fill="#111c33"/>
  <text x="600" y="90" text-anchor="middle" fill="#64748b" font-size="12">resume-builder.app  —  Live Preview</text>

  <!-- toolbar -->
  <rect x="60" y="112" width="1080" height="56" fill="#0c1526"/>
  <g transform="translate(92,128)">
    <rect width="150" height="26" rx="13" fill="url(#brand)"/>
    <text x="75" y="18" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Resume Builder</text>
  </g>
  <g transform="translate(880,124)">
    <rect width="120" height="32" rx="8" fill="#16223d" stroke="#24324f"/>
    <text x="60" y="21" text-anchor="middle" fill="#94a3b8" font-size="12">Template ▾</text>
  </g>
  <g transform="translate(1010,124)">
    <rect width="110" height="32" rx="8" fill="url(#btn)"/>
    <text x="55" y="21" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">⬇ PDF</text>
  </g>

  <!-- Left: form panel -->
  <g transform="translate(84,188)">
    <rect width="430" height="480" rx="14" fill="#0e1830" stroke="#1c2742"/>
    <text x="22" y="36" fill="#cbd5e1" font-size="15" font-weight="700">Edit Profile</text>
    <line x1="22" y1="50" x2="408" y2="50" stroke="#1c2742"/>

    <!-- fields -->
    <g font-size="11" fill="#7c8aa5">
      <text x="22" y="78">Full name</text>
      <rect x="22" y="86" width="386" height="34" rx="8" fill="#0a1224" stroke="#1c2742"/>
      <text x="34" y="107" fill="#e2e8f0" font-size="13">Prottus Manna</text>

      <text x="22" y="146">Role / Headline</text>
      <rect x="22" y="154" width="386" height="34" rx="8" fill="#0a1224" stroke="#1c2742"/>
      <text x="34" y="175" fill="#e2e8f0" font-size="13">Full-Stack Developer &amp; AI Engineer</text>

      <text x="22" y="214">Experience</text>
      <rect x="22" y="222" width="386" height="92" rx="8" fill="#0a1224" stroke="#1c2742"/>
      <text x="34" y="244" fill="#e2e8f0" font-size="12">• ML Intern — Zidio Developments</text>
      <text x="34" y="264" fill="#94a3b8" font-size="12">• Best Intern Award · 83%</text>
      <text x="34" y="284" fill="#94a3b8" font-size="12">• Built Optimus AI · Vision AI Suite…</text>

      <text x="22" y="344">Skills</text>
      <g font-size="11" fill="#e2e8f0">
        <rect x="22" y="352" width="80" height="24" rx="12" fill="#16284a" stroke="#2a3a63"/>
        <text x="62" y="368" text-anchor="middle">Python</text>
        <rect x="110" y="352" width="74" height="24" rx="12" fill="#16284a" stroke="#2a3a63"/>
        <text x="147" y="368" text-anchor="middle">React</text>
        <rect x="192" y="352" width="74" height="24" rx="12" fill="#16284a" stroke="#2a3a63"/>
        <text x="229" y="368" text-anchor="middle">PyTorch</text>
        <rect x="274" y="352" width="80" height="24" rx="12" fill="#16284a" stroke="#2a3a63"/>
        <text x="314" y="368" text-anchor="middle">Node.js</text>
      </g>

      <text x="22" y="404">Education</text>
      <rect x="22" y="412" width="386" height="48" rx="8" fill="#0a1224" stroke="#1c2742"/>
      <text x="34" y="432" fill="#e2e8f0" font-size="12">B.Tech IT — IEM, Kolkata</text>
      <text x="34" y="450" fill="#94a3b8" font-size="11">SGPA 9.00 · 2022–2026</text>
    </g>
