<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0f0a"/>
      <stop offset="1" stop-color="#1e1130"/>
    </linearGradient>
    <linearGradient id="brand2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="ai2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#f43f5e"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="750" fill="url(#bg2)"/>
  <circle cx="200" cy="120" r="220" fill="#f59e0b" opacity="0.10"/>
  <circle cx="1000" cy="640" r="220" fill="#f43f5e" opacity="0.10"/>

  <!-- App window -->
  <g filter="url(#shadow2)">
    <rect x="60" y="60" width="1080" height="630" rx="20" fill="#171022" stroke="#2a1c3a"/>
  </g>

  <!-- titlebar -->
  <rect x="60" y="60" width="1080" height="52" rx="20" fill="#140d20"/>
  <rect x="60" y="98" width="1080" height="14" fill="#140d20"/>
  <circle cx="92" cy="86" r="7" fill="#ef4444"/>
  <circle cx="116" cy="86" r="7" fill="#f59e0b"/>
  <circle cx="140" cy="86" r="7" fill="#22c55e"/>
  <text x="600" y="90" text-anchor="middle" fill="#7c6b88" font-size="12">helplink.ai  —  your context-aware help assistant</text>

  <!-- Sidebar -->
  <g transform="translate(60,112)">
    <rect width="250" height="578" rx="0" fill="#1a1228"/>
    <rect width="250" height="64" fill="url(#brand2)" rx="0"/>
    <rect y="56" width="250" height="8" fill="#1a1228"/>
    <g transform="translate(20,22)">
      <circle cx="14" cy="12" r="13" fill="#ffffff22"/>
      <text x="14" y="17" text-anchor="middle" fill="#fff" font-size="15">⌘</text>
      <text x="38" y="17" fill="#fff" font-size="16" font-weight="800">Helplink AI</text>
    </g>

    <g font-size="12" fill="#c9b8d6">
      <rect x="16" y="86" width="218" height="34" rx="9" fill="#ffffff14"/>
      <circle cx="34" cy="103" r="3" fill="#f59e0b"/>
      <text x="50" y="107" font-weight="600">Getting started</text>
      <text x="232" y="107" text-anchor="end" fill="#7c6b88">12</text>

      <text x="34" y="146" fill="#7c6b88">Topics</text>
      <text x="50" y="172">Billing &amp; plans</text>
      <text x="50" y="198">Account</text>
      <text x="50" y="224">Integrations</text>
      <text x="50" y="250">API &amp; webhooks</text>
      <text x="50" y="276">Troubleshooting</text>

      <line x1="16" y1="300" x2="234" y2="300" stroke="#2a1c3a"/>
      <text x="34" y="328" fill="#7c6b88">Recent chats</text>
      <text x="34" y="354" fill="#c9b8d6">How to reset password…</text>
      <text x="34" y="380" fill="#c9b8d6">RAG setup guide</text>
      <text x="34" y="406" fill="#c9b8d6">Export invoice PDF</text>
    </g>
  </g>

  <!-- Main chat area -->
  <g transform="translate(310,112)">
    <rect width="830" height="578" fill="#160f24"/>

    <!-- header -->
    <rect width="830" height="56" fill="#1a1228"/>
    <text x="24" y="34" fill="#f1e8f5" font-size="15" font-weight="700">Getting started</text>
    <text x="24" y="48" fill="#7c6b88" font-size="11">AI assistant · grounded in your knowledge base</text>
    <g transform="translate(760,18)">
      <rect width="54" height="22" rx="11" fill="#2a1c3a"/>
      <text x="27" y="15" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="700">RAG</text>
    </g>

    <!-- user bubble -->
    <g transform="translate(470,96)">
      <rect width="324" height="74" rx="14" fill="url(#brand2)"/>
      <text x="20" y="30" fill="#fff" font-size="13" font-weight="600">How do I set up the RAG pipeline</text>
      <text x="20" y="50" fill="#fff" font-size="13" font-weight="600">for my docs?</text>
    </g>

    <!-- AI bubble -->
    <g transform="translate(40,190)">
      <rect width="560" height="184" rx="14" fill="#221833" stroke="#332244"/>
      <g transform="translate(20,18)">
        <circle cx="14" cy="14" r="13" fill="url(#ai2)"/>
        <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="13" font-weight="800">H</text>
        <text x="40" y="19" fill="#f1e8f5" font-size="13" font-weight="700">Helplink AI</text>
      </g>
      <text x="20" y="64" fill="#c9b8d6" font-size="12">Index your docs, embed them, then query with recency</text>
      <text x="20" y="82" fill="#c9b8d6" font-size="12">filters. Here's the linked guide + a starter snippet:</text>

      <!-- linked resource card -->
      <g transform="translate(20,96)">
        <rect width="520" height="66" rx="12" fill="#160f24" stroke="#3a2a4d"/>
        <rect width="6" height="66" rx="3" fill="url(#ai2)"/>
        <text x="22" y="26" fill="#f1e8f5" font-size="12" font-weight="700">📘 RAG Setup Guide</text>
        <text x="22" y="46" fill="#9a86ad" font-size="11">docs.helplink.ai/guides/rag-setup · 6 min read</text>
        <text x="498" y="42" text-anchor="end" fill="#f59e0b" font-size="11" font-weight="700">Open →</text>
      </g>
    </g>

    <!-- suggested chips -->
    <g transform="translate(40,392)" font-size="11" fill="#c9b8d6">
      <rect width="120" height="30" rx="15" fill="#221833" stroke="#332244"/>
      <text x="60" y="19" text-anchor="middle">Embed my docs</text>
      <g transform="translate(132,0)">
        <rect width="150" height="30" rx="15" fill="#221833" stroke="#332244"/>
        <text x="75" y="19" text-anchor="middle">Show code snippet</text>
      </g>
      <g transform="translate(294,0)">
        <rect width="150" height="30" rx="15" fill="#221833" stroke="#332244"/>
        <text x="75" y="19" text-anchor="middle">Link a contact</text>
      </g>
    </g>

    <!-- input bar -->
    <g transform="translate(24,460)">
      <rect width="782" height="54" rx="14" fill="#1a1228" stroke="#2a1c3a"/>
      <text x="22" y="33" fill="#7c6b88" font-size="13">Ask for help, or paste an error…</text>
      <g transform="translate(720,11)">
        <rect width="46" height="32" rx="10" fill="url(#brand2)"/>
        <text x="23" y="22" text-anchor="middle" fill="#fff" font-size="15">➤</text>
      </g>
    </g>
    <text x="24" y="538" fill="#5c4a6e" font-size="10">Helplink AI can link resources. Verify important answers.</text>
  </g>

  <text x="1140" y="724" text-anchor="end" fill="#5c4a6e" font-size="10">Helplink AI · demo</text>
</svg>